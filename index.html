<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webinar App</title>

    <!-- Load React and Babel from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <!-- Root element where React will render -->
    <div id="root"></div>
<script type="text/babel">
  function App() {
    return (
      <div style={{ fontFamily: "Arial, sans-serif", backgroundColor: "#f5f7fa" }}>
        <header style={{ backgroundColor: "#0056b3", color: "white", padding: "30px 0", textAlign: "center" }}>
          <h1>Webinar Title Goes Here</h1>
          <p>Join us for an insightful webinar session</p>
        </header>

        <div style={{ display: "flex", justifyContent: "center", marginTop: "40px" }}>
          <div style={{ backgroundColor: "white", padding: "30px", borderRadius: "10px", width: "400px", marginRight: "20px" }}>
            <h2>About This Webinar</h2>
            <p>Add your webinar description here. Include topic, agenda, speaker details, and key takeaways.</p>
            <div style={{ backgroundColor: "#e8f0fe", padding: "10px", borderRadius: "5px" }}>
              <p><strong>Date:</strong> 26 June 2026</p>
              <p><strong>Time:</strong> 4:00 PM IST</p>
              <p><strong>Duration:</strong> 60 minutes</p>
            </div>
          </div>

          <div style={{ backgroundColor: "white", padding: "30px", borderRadius: "10px", width: "400px" }}>
            <h2>Register Now</h2>
            <form>
              <input type="text" placeholder="First Name *" style={{ width: "100%", marginBottom: "10px", padding: "8px" }} />
              <input type="text" placeholder="Last Name *" style={{ width: "100%", marginBottom: "10px", padding: "8px" }} />
              <input type="email" placeholder="Email Address *" style={{ width: "100%", marginBottom: "10px", padding: "8px" }} />
              <input type="text" placeholder="Company *" style={{ width: "100%", marginBottom: "10px", padding: "8px" }} />
              <input type="text" placeholder="Job Title" style={{ width: "100%", marginBottom: "10px", padding: "8px" }} />
              <select style={{ width: "100%", marginBottom: "10px", padding: "8px" }}>
                <option>Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
              </select>
              <label>
                <input type="checkbox" /> I agree to receive communications related to this webinar.
              </label>
              <button type="submit" style={{ width: "100%", marginTop: "15px", padding: "10px", backgroundColor: "#0056b3", color: "white", border: "none", borderRadius: "5px" }}>
                Register
              </button>
            </form>
          </div>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>

  </body>
</html>
